app = "fif-backend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_URL = "https://fif-backend.fly.dev"
  FRONTEND_URL = "https://fif-backend.fly.dev"
  DB_CONNECTION = "sqlite"
  QUEUE_CONNECTION = "database"
  SESSION_DRIVER = "database"
  CACHE_STORE = "database"
  BROADCAST_CONNECTION = "log"
  SANCTUM_STATEFUL_DOMAINS = "fif-backend.fly.dev"
  CORS_ALLOWED_ORIGINS = "https://fif-backend.fly.dev"
